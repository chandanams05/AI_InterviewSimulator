<!DOCTYPE html>
<html>
<head>
<title>Interview</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("https://www.peoplebox.ai/wp-content/uploads/2025/11/ChatGPT-Image-Nov-20-2025-04_41_05-PM.png");
background-size: cover;
background-position: center;
background-attachment: fixed;
font-family:'Segoe UI', sans-serif;
font-size:18px;
}

.card-box{
background:rgba(255,255,255,0.97);
padding:40px;
border-radius:18px;
width:100%;
max-width:1300px;
}

.question-box{
background:#f8f9fa;
padding:25px;
border-radius:12px;
margin-bottom:25px;
}

textarea{
min-height:140px;
font-size:16px;
padding:12px;
border-radius:10px;
}

.btn{
font-size:16px;
padding:12px;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container-fluid px-4">

<span class="navbar-brand fw-bold">
AI Interview Simulator
</span>

<a href="/logout" class="btn btn-outline-light">
Logout
</a>

</div>
</nav>

<div class="container-fluid px-5 mt-4 mb-5">

<div class="card-box mx-auto">

<h3 class="text-center mb-4">{{ role }} Interview</h3>

<form method="POST" action="/result">

{% for q in questions %}

<div class="question-box">

<h5>Question {{ loop.index }}</h5>
<p>{{ q.question }}</p>

<textarea name="answer{{loop.index}}" class="form-control" required></textarea>

</div>

{% endfor %}

<button class="btn btn-primary w-100">
Submit Answers
</button>

</form>

</div>

</div>

</body>
</html>
