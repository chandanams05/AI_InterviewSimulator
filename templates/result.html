<!DOCTYPE html>
<html>
<head>
<title>Interview Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("https://www.peoplebox.ai/wp-content/uploads/2025/11/ChatGPT-Image-Nov-20-2025-04_41_05-PM.png");
background-size: cover;
background-position: center;
background-attachment: fixed;
font-family:'Segoe UI', sans-serif;
}

.main-box{
background:rgba(255,255,255,0.97);
padding:40px;
border-radius:18px;
width:100%;
max-width:1300px;
}

.result-card{
background:#f8f9fa;
padding:25px;
border-radius:12px;
margin-bottom:20px;
}

h2{
font-size:34px;
}

.score{
font-weight:bold;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container-fluid px-4">

<span class="navbar-brand fw-bold">
AI Interview Simulator
</span>

<a href="/logout" class="btn btn-outline-light">
Logout
</a>

</div>
</nav>

<div class="container-fluid px-5 mt-4 mb-5">

<div class="main-box mx-auto">

<h2 class="text-center mb-4">Interview Result</h2>

<h4 class="text-center mb-4">
Average Score : {{average}} / 10
</h4>

{% for r in results %}

<div class="result-card">

<p><strong>Question:</strong> {{r.question}}</p>
<p><strong>Your Answer:</strong> {{r.answer}}</p>
<p><strong>Feedback:</strong> {{r.feedback}}</p>
<p class="score">Score: {{r.score}} / 10</p>

</div>

{% endfor %}

<div class="text-center mt-4">

<a href="/new_interview" class="btn btn-primary me-2">
Take Another Interview
</a>

<a href="/logout" class="btn btn-danger">
Logout
</a>

</div>

</div>

</div>

</body>
</html>
