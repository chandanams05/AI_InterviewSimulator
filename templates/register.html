<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("https://www.peoplebox.ai/wp-content/uploads/2025/11/ChatGPT-Image-Nov-20-2025-04_41_05-PM.png");
background-size: cover;
background-position: center;
background-attachment: fixed;
font-family:'Segoe UI', sans-serif;
font-size:18px;
}

.card-box{
background:rgba(255,255,255,0.97);
padding:45px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
width:100%;
max-width:900px;
}

h3{
font-size:30px;
font-weight:600;
}

.form-control{
font-size:16px;
padding:12px;
border-radius:10px;
}

.btn{
font-size:16px;
padding:12px;
border-radius:10px;
}
</style>

</head>

<body>

<div class="container-fluid d-flex justify-content-center align-items-center vh-100 px-4">

<div class="card-box mx-auto">

<h3 class="text-center mb-4">Create Account</h3>

<form method="POST">

<div class="mb-3">
<label>Username</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<button class="btn btn-primary w-100">Register</button>

</form>

<p class="text-center mt-3">
Already have account?
<a href="/login">Login</a>
</p>

</div>
</div>

</body>
</html>
