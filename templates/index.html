<!DOCTYPE html>
<html>
<head>
<title>Select Role</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{

background:
linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
url("https://www.peoplebox.ai/wp-content/uploads/2025/11/ChatGPT-Image-Nov-20-2025-04_41_05-PM.png");
background-size: cover;
background-position: center;
background-attachment: fixed;
font-family:'Segoe UI', sans-serif;
font-size:18px;
}

.card-box{
background:rgba(255,255,255,0.97);
padding:50px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
width:100%;
max-width:1000px;
}

h3{
font-size:32px;
font-weight:600;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container-fluid px-4">

<span class="navbar-brand fw-bold">
AI Interview Simulator
</span>

<a href="/logout" class="btn btn-outline-light">
Logout
</a>

</div>
</nav>

<div class="container-fluid d-flex justify-content-center align-items-center vh-100 px-4">

<div class="card-box mx-auto">

<h3 class="text-center mb-4">Select Interview Role</h3>

<form method="POST">

<select name="role" class="form-select mb-4" style="padding:12px; font-size:16px;">

{% for role in roles %}
<option value="{{role}}">{{role}}</option>
{% endfor %}

</select>

<button class="btn btn-primary w-100">
Start Interview
</button>

</form>

</div>

</div>

</body>
</html>
